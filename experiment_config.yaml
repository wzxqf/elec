project:
  version: v0.45
  project_root: .

data:
  sample_start: "2025-11-01 00:00:00"
  sample_end: "2026-03-20 23:45:00"
  buffer_end: "2026-03-28 23:45:00"
  policy_directory: 政策环境
  data_candidates:
    - total.csv
    - data/total.csv
  expected_frequency_minutes: 15
  datetime_column: datetime
  duplicate_strategy: mean
  settlement_interval_hours: 0.25
  hour_interval_hours: 1.0
  week_period: W-SUN
  scan_buffer_end: "2026-03-28 23:45:00"
  feature_quantiles:
    - 0.25
    - 0.50
    - 0.75
  weekly_target_column: net_load_da_mwh
  actual_target_column: net_load_id_mwh
  lt_price:
    preferred_columns: []
    fallback_method: previous_week_da_mean
    warmup_label: warmup_unavailable
    linked_effective_start: "2026-02-01 00:00:00"

outputs:
  root: outputs

split:
  train_start_week: "2025-11-03 00:00:00"
  train_end_week: "2026-01-26 00:00:00"
  val_start_week: "2026-02-02 00:00:00"
  val_end_week: "2026-02-23 00:00:00"
  test_start_week: "2026-03-02 00:00:00"
  test_end_week: "2026-03-16 00:00:00"

rolling_validation:
  enabled: true
  windows:
    - name: 窗口A
      train_end_week: "2026-01-05 00:00:00"
      val_start_week: "2026-01-12 00:00:00"
      val_end_week: "2026-02-02 00:00:00"
    - name: 窗口B
      train_end_week: "2026-01-19 00:00:00"
      val_start_week: "2026-01-26 00:00:00"
      val_end_week: "2026-02-16 00:00:00"
    - name: 窗口C
      train_end_week: "2026-01-26 00:00:00"
      val_start_week: "2026-02-02 00:00:00"
      val_end_week: "2026-02-23 00:00:00"

rolling_retrain:
  enabled: true
  mode: expanding
  train_min_weeks: 8
  val_weeks: 2
  test_weeks: 1
  step_weeks: 1

reward:
  baseline_strategy: dynamic_lock_only
  cvar_alpha: 0.99
  lambda_tail: 0.65
  lambda_hedge: 0.18
  lambda_trade: 0.10
  lambda_violate: 1.00
  robust_eps: 1.0e-6

score_kernel:
  contract_adjustment_scale_ratio: 0.30
  contract_adjustment_feature_scale: 0.15
  contract_adjustment_policy_scale: 0.05
  exposure_band_base_ratio: 0.20
  exposure_band_feature_scale: 0.10
  contract_position_base_ratio: 0.60
  baseline_position_ratio: 0.55
  baseline_projection_penalty_scale: 0.05
  lt_settlement_weight: 0.60
  da_settlement_weight: 0.40
  hourly_signal:
    spread_weight: 0.02
    load_dev_weight: 0.01
    renewable_weight: 0.01
    spread_abs_weight: 0.005
    renewable_abs_weight: 0.004
  session_weights:
    business_hour: 0.50
    peak_hour: 0.30
    valley_hour: -0.20
    renewable_valley_mix: 0.50
    renewable_business_mix: 0.50
  hourly_limit:
    base_multiplier: 0.50
    shrink_multiplier: 0.50

training:
  algorithm: HYBRID_PSO_V040
  seed: 42
  device: cuda
  allow_cpu: true

parameter_compiler:
  enabled: true
  upper:
    weekly_feature_source: agent_feature_columns
    policy_feature_source: policy_state_numeric_columns
    blocks:
      weekly_feature_weights:
        source: agent_feature_columns
      policy_feature_weights:
        source: policy_state_numeric_columns
        include:
          - renewable_mechanism_active
          - lt_price_linked_active
          - forward_price_linkage_days
          - forward_mechanism_execution_days
          - forward_ancillary_coupling_days
          - forward_info_forecast_boundary_days
      # 正式参数：v0.45 balanced
      # explore 备选（未升格正式入口）：size = 24
      contract_curve_latent:
        size: 20
      # 正式参数：v0.45 balanced
      # explore 备选（未升格正式入口）：size = 10
      action_head:
        size: 8
  lower:
    hourly_feature_groups:
      spread_response:
        columns:
          - price_spread
        # explore 备选（未升格正式入口）：response_size = 16
        response_size: 12
      load_deviation_response:
        columns:
          - load_dev
        # explore 备选（未升格正式入口）：response_size = 16
        response_size: 12
      renewable_response:
        columns:
          - renewable_dev
        # explore 备选（未升格正式入口）：response_size = 16
        response_size: 12
      policy_shrink_response:
        columns:
          - ancillary_freq_reserve_tight
        # explore 备选（未升格正式入口）：response_size = 16
        response_size: 12

policy_projection:
  mode: policy_only
  clip_method: projection_only
  violation_penalty_scale: 1.0
  enforce_non_negative_position: true
  bind_to_policy_states:
    - renewable_mechanism_active
    - lt_price_linked_active
    - ancillary_freq_reserve_tight
    - ancillary_peak_shaving_pause

policy_feasible_domain:
  enabled: true
  strict_mode: true
  bind_upper_actions: true
  bind_lower_actions: true
  bind_settlement_mode: true
  non_negative_position_required: true
  contract_adjustment_ratio_limit: 0.30
  contract_adjustment_ratio_limit_linked: 0.12
  exposure_band_ratio_floor: 0.05
  exposure_band_ratio_cap: 0.25
  exposure_band_ratio_cap_ancillary_tight: 0.12
  hourly_hedge_share_cap: 1.00
  hourly_hedge_share_cap_ancillary_tight: 0.40
  hourly_ramp_share_cap: 1.00
  hourly_ramp_share_cap_renewable_active: 0.20

upper_strategy:
  contract_curve_hours: 24
  feature_columns:
    - prev_spread_mean
    - prev_da_price_mean
    - prev_id_price_mean
    - prev_load_dev_std
    - prev_renewable_ratio_da_mean
    - renewable_mechanism_active
    - lt_price_linked_active
    - forward_price_linkage_days
    - forward_mechanism_execution_days
    - forward_ancillary_coupling_days
    - forward_info_forecast_boundary_days
  parameter_layout:
    contract_adjustment_weights: 3
    exposure_band_weights: 3
    contract_curve_weights: 4
    policy_gate_weights: 2
  adjustment_scale_mwh: 0.30
  exposure_band_scale_mwh: 0.25

lower_strategy:
  feature_columns:
    - price_spread
    - load_dev
    - renewable_dev
    - ancillary_freq_reserve_tight
    - ancillary_peak_shaving_pause
  parameter_layout:
    spread_response: 2
    load_deviation_response: 2
    renewable_response: 2
    policy_shrink_response: 2
  smooth_window_hours: 3

economics:
  retail_tariff_yuan_per_mwh: 430.0
  imbalance_penalty_multiplier: 1.00
  adjustment_cost_yuan_per_mwh: 0.60
  friction_cost_yuan_per_mwh: 1.20
  risk_cost_yuan_per_mwh: 0.0
  baseline_strategy: dynamic_lock_only

scenario:
  train_sequence_length: 96
  block_size: 3
  bootstrap_seed: 42
  training_sequence_method: block_bootstrap

feature_selection:
  enabled: true
  feature_include_for_agent:
    - lt_settlement_base
    - spot_marginal_exposure
    - ancillary_freq_reserve_tight
    - ancillary_peak_shaving_pause
    - renewable_mechanism_active
    - mechanism_price_floor
    - mechanism_price_ceiling
    - mechanism_volume_ratio_max
    - lt_price_linked_active
    - fixed_price_ratio_max
    - linked_price_ratio_min
    - forward_price_linkage_days
    - forward_mechanism_execution_days
    - forward_ancillary_coupling_days
    - forward_info_forecast_boundary_days
  feature_exclude_for_agent: []
  feature_keep_for_report_only:
    - policy_count
    - policy_source_file_count
    - policy_parse_failure_count
    - policy_names
    - policy_sources
    - active_state_groups

policy_regime:
  pre_switch_window_days: 28
  countdown_cap_days: 60
  default_effective_end: null
  continue_on_parse_error: true

reporting:
  use_intraday_proxy_settlement: true
  settlement_note: "15分钟日内代理结算口径"
  use_estimated_lt_price: true
  lt_price_note: "2026-02 前采用上一自然周日前均价代理，2026-02 起采用 40% 日前固定价 + 60% 日内联动价混合代理"

analysis:
  sensitivity_export_prefix: sensitivity
  robustness_export_prefix: robustness
  diagnostics_sample_weeks: 3
  worker_count: 8
  export_rule_trace: true
  export_settlement_trace: true

analysis_v035:
  price_spike_zscore_threshold: 2.5
  extreme_event_std_threshold: 2.0
  policy_risk_switch_weight: 1.0
  policy_risk_countdown_weight: 0.2
  policy_risk_projection_weight: 1.0
  policy_risk_violation_weight: 1.0
  sharpe_epsilon: 1.0e-6

sensitivity:
  beta_tail_risk:
    - 0.40
    - 0.55
    - 0.70
  market_vol_scale:
    - 0.80
    - 1.00
    - 1.20
  price_cap_multiplier:
    - 0.90
    - 1.00
    - 1.10

robustness:
  contract_ratio_shift:
    - -0.10
    - 0.00
    - 0.10
  policy_cutoffs:
    - "2026-01-01"
    - "2026-02-01"
  forecast_error_scale:
    - 0.80
    - 1.00
    - 1.20

search:
  enabled: true
  stage1_trials: 24
  stage1_timesteps: 12000
  stage2_topk: 6
  stage2_timesteps: 30000
  random_seed: 42
  worker_count: 1
  stage1_ranges:
    learning_rate:
      - 0.00008
      - 0.00025
    n_steps_choices:
      - 128
      - 256
    batch_size_choices:
      - 32
      - 64
    gamma:
      - 0.99
      - 0.997
    gae_lambda:
      - 0.95
      - 0.985
    clip_range:
      - 0.10
      - 0.18
    ent_coef:
      - 0.002
      - 0.010
    lambda_hedge_error:
      - 0.10
      - 0.30
    lambda_hourly_smooth:
      - 0.04
      - 0.12
    gamma_max:
      - 300.0
      - 500.0
    band_base_multiplier:
      - 0.95
      - 1.15
    price_spike_shrink:
      - 0.08
      - 0.18

hybrid_pso:
  seed: 42
  optimizer:
    # 正式参数：v0.45 balanced
    # explore 备选（未升格正式入口）：init_scale = 0.14
    init_scale: 0.12
    # explore 备选（未升格正式入口）：inertia = 0.72
    inertia: 0.68
    # explore 备选（未升格正式入口）：cognitive = 1.20
    cognitive: 1.30
    # explore 备选（未升格正式入口）：social = 1.60
    social: 1.45
    # explore 备选（未升格正式入口）：position_clip_abs = 1.35
    position_clip_abs: 1.25
  upper:
    # explore 备选（未升格正式入口）：particles = 224, iterations = 360, dimension = 192
    particles: 192
    iterations: 320
    dimension: 186
  lower:
    # explore 备选（未升格正式入口）：particles = 192, iterations = 360, dimension = 64
    particles: 160
    iterations: 320
    dimension: 48

policy_deep:
  llm_candidate_parser:
    enabled: false
    cache_only: true

