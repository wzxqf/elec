project:
  version: v0.32
  project_root: d:/elec

data:
  sample_start: "2025-11-01 00:00:00"
  sample_end: "2026-03-20 23:45:00"
  buffer_end: "2026-03-28 23:45:00"
  policy_directory: d:/elec/政策环境
  data_candidates:
    - d:/elec/total.csv
    - d:/elec/data/total.csv
  expected_frequency_minutes: 15
  datetime_column: datetime
  duplicate_strategy: mean
  settlement_interval_hours: 0.25
  hour_interval_hours: 1.0
  week_period: W-SUN
  scan_buffer_end: "2026-03-28 23:45:00"
  feature_quantiles:
    - 0.25
    - 0.50
    - 0.75
  weekly_target_column: net_load_da_mwh
  actual_target_column: net_load_id_mwh
  lt_price:
    preferred_columns: []
    fallback_method: previous_week_da_mean
    warmup_label: warmup_unavailable
    linked_effective_start: "2026-02-01 00:00:00"

outputs:
  root: d:/elec/outputs

split:
  train_start_week: "2025-11-03 00:00:00"
  train_end_week: "2026-01-26 00:00:00"
  val_start_week: "2026-02-02 00:00:00"
  val_end_week: "2026-02-23 00:00:00"
  test_start_week: "2026-03-02 00:00:00"
  test_end_week: "2026-03-16 00:00:00"

rolling_validation:
  enabled: true
  windows:
    - name: 窗口A
      train_end_week: "2026-01-05 00:00:00"
      val_start_week: "2026-01-12 00:00:00"
      val_end_week: "2026-02-02 00:00:00"
    - name: 窗口B
      train_end_week: "2026-01-19 00:00:00"
      val_start_week: "2026-01-26 00:00:00"
      val_end_week: "2026-02-16 00:00:00"
    - name: 窗口C
      train_end_week: "2026-01-26 00:00:00"
      val_start_week: "2026-02-02 00:00:00"
      val_end_week: "2026-02-23 00:00:00"

cost:
  risk_vol_weight: 0.50
  risk_cvar_weight: 0.50
  transaction_linear: 1.20
  transaction_quadratic: 0.015
  lt_adjust_cost: 0.60
  imbalance_penalty_multiplier: 1.00
  cvar_alpha: 0.95
  cvar_budget_ratio: 0.18
  cvar_budget_min: 220000.0
  cvar_budget_eps: 1.0

constraints:
  lock_ratio_min: 0.10
  lock_ratio_max: 0.85
  delta_h_max: 0.12
  delta_lock_cap: 0.12

reward:
  strong_baseline: dynamic_lock_only
  alpha_cost: 1.15
  beta_tail_risk: 0.55
  lambda_action_smooth: 0.12
  lambda_hourly_smooth: 0.08
  lambda_hedge_error: 0.18
  robust_eps: 1.0e-6

env:
  include_prev_reward: true
  reward_temperature: 2.2

rules:
  price_spread_weight: 0.45
  load_dev_weight: 0.35
  renewable_dev_weight: 0.20
  spread_threshold: 8.0
  load_dev_threshold: 120.0
  renewable_dev_threshold: 100.0
  band_base_multiplier: 1.05
  band_floor_mwh: 30.0
  band_cap_ratio: 1.10
  ancillary_tight_multiplier: 0.88
  peak_shaving_pause_multiplier: 0.92
  price_spike_shrink: 0.12
  gamma_max: 420.0
  non_negative_clip: true
  signal_clip: 1.0
  smoothing_mode: soft_clip

training:
  algorithm: HPSO_PARAM_POLICY
  seed: 42
  device: cuda
  allow_cpu: true

scenario:
  train_sequence_length: 96
  block_size: 3
  bootstrap_seed: 42
  training_sequence_method: block_bootstrap

benchmarks:
  fixed_lock_ratio: 0.60
  dynamic_lock_base: 0.55
  dynamic_lock_spread_penalty: 0.10
  dynamic_lock_renewable_bonus: 0.08
  dynamic_lock_policy_bonus: 0.05
  dynamic_lock_linked_price_penalty: 0.08
  rule_only_bandwidth: 0.70

feature_selection:
  enabled: true
  feature_include_for_agent:
    - lt_settlement_base
    - spot_marginal_exposure
    - ancillary_freq_reserve_tight
    - ancillary_peak_shaving_pause
    - renewable_mechanism_active
    - mechanism_price_floor
    - mechanism_price_ceiling
    - mechanism_volume_ratio_max
    - lt_price_linked_active
    - fixed_price_ratio_max
    - linked_price_ratio_min
    - forward_price_linkage_days
    - forward_mechanism_execution_days
  feature_exclude_for_agent: []
  feature_keep_for_report_only:
    - policy_count
    - policy_source_file_count
    - policy_parse_failure_count
    - policy_names
    - policy_sources
    - active_state_groups

policy_regime:
  pre_switch_window_days: 28
  countdown_cap_days: 60
  default_effective_end: null
  continue_on_parse_error: true

reporting:
  use_intraday_proxy_settlement: true
  settlement_note: "15分钟日内代理结算口径"
  use_estimated_lt_price: true
  lt_price_note: "2026-02 前采用上一自然周日前均价代理，2026-02 起采用 40% 日前固定价 + 60% 日内联动价混合代理"

analysis:
  sensitivity_export_prefix: sensitivity
  robustness_export_prefix: robustness
  diagnostics_sample_weeks: 3
  worker_count: 8
  export_rule_trace: true
  export_settlement_trace: true

sensitivity:
  beta_tail_risk:
    - 0.40
    - 0.55
    - 0.70
  market_vol_scale:
    - 0.80
    - 1.00
    - 1.20
  price_cap_multiplier:
    - 0.90
    - 1.00
    - 1.10

robustness:
  contract_ratio_shift:
    - -0.10
    - 0.00
    - 0.10
  policy_cutoffs:
    - "2026-01-01"
    - "2026-02-01"
  forecast_error_scale:
    - 0.80
    - 1.00
    - 1.20

search:
  enabled: true
  stage1_trials: 24
  stage1_timesteps: 12000
  stage2_topk: 6
  stage2_timesteps: 30000
  random_seed: 42
  worker_count: 1
  stage1_ranges:
    learning_rate:
      - 0.00008
      - 0.00025
    n_steps_choices:
      - 128
      - 256
    batch_size_choices:
      - 32
      - 64
    gamma:
      - 0.99
      - 0.997
    gae_lambda:
      - 0.95
      - 0.985
    clip_range:
      - 0.10
      - 0.18
    ent_coef:
      - 0.002
      - 0.010
    lambda_hedge_error:
      - 0.10
      - 0.30
    lambda_hourly_smooth:
      - 0.04
      - 0.12
    gamma_max:
      - 300.0
      - 500.0
    band_base_multiplier:
      - 0.95
      - 1.15
    price_spike_shrink:
      - 0.08
      - 0.18

hpso:
  device: cuda
  allow_cpu: true
  seed: 42
  parameter_dimension: 64
  theta_layout:
    upper_total: 40
    lower_total: 24
    upper:
      lock_delta_weights: 16
      bandwidth_weights: 12
      curve_shape_weights: 8
      policy_gate_weights: 4
    lower:
      spread_response: 6
      load_forecast_response: 6
      renewable_response: 4
      smoothing_response: 4
      policy_band_shrink: 4
  swarm:
    particles: 48
    iterations: 80
    inertia_weight: 0.70
    cognitive_factor: 1.45
    social_factor: 1.45
    initial_temperature: 1.0
    cooling_rate: 0.96
    perturbation_scale: 0.05
    stagnation_window: 10
    backprop_steps: 0
    backprop_learning_rate: 0.0
    backprop_clip_norm: 5.0
  bootstrap:
    sequence_length: 96
    block_size: 3
    scenario_repeats: 4
  upper:
    particles: 32
    iterations: 40
    inertia_weight: 0.72
    cognitive_factor: 1.45
    social_factor: 1.45
    initial_temperature: 1.0
    cooling_rate: 0.94
    perturbation_scale: 0.06
    stagnation_window: 8
    backprop_steps: 4
    backprop_learning_rate: 0.02
    backprop_clip_norm: 5.0
    contract_adjustment_initial_radius: 1.0
    exposure_bandwidth_min: 0.0
    exposure_bandwidth_max: 0.85
  lower:
    particles: 24
    iterations: 35
    inertia_weight: 0.68
    cognitive_factor: 1.35
    social_factor: 1.55
    initial_temperature: 1.0
    cooling_rate: 0.93
    perturbation_scale: 0.05
    stagnation_window: 7
    backprop_steps: 4
    backprop_learning_rate: 0.02
    backprop_clip_norm: 5.0
    spot_delta_initial_radius_multiplier: 1.0
  objective_weights:
    procurement_cost: 1.00
    dynamic_baseline_gap: 1.15
    tail_risk: 0.55
    risk: 0.50
    transaction: 1.00
    weekly_lock_change: 0.60
    hourly_smooth: 0.08
    hedge_error: 0.18
    contract_adjustment_quadratic: 5.00
    spot_delta_quadratic: 1.00
    constraint_violation: 1000000.0

policy:
  upper:
    lock_delta_scale: 0.12
    bandwidth_min: 0.0
    bandwidth_max: 0.85
    state_features:
      - prev_spread_mean
      - prev_da_price_mean
      - prev_id_price_mean
      - prev_load_dev_std
      - prev_renewable_ratio_da_mean
      - renewable_mechanism_active
      - lt_price_linked_active
      - forward_price_linkage_days
      - forward_mechanism_execution_days
  lower:
    rolling_mode: causal
    non_negative_spot: true
    smooth_limit_mwh: 420.0
  contract_curve:
    enabled: true
    periods: 24
    base_profile_source: train_da_net_load
    shape_adjustment_scale: 0.20
    positive_floor: 0.05
    peak_hours:
      - 8
      - 9
      - 10
      - 11
      - 18
      - 19
      - 20
      - 21
    valley_hours:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
