cost:
  risk_vol_weight: 0.5
  risk_cvar_weight: 0.5
  transaction_linear: 1.2
  transaction_quadratic: 0.015
  lt_adjust_cost: 0.6
  imbalance_penalty_multiplier: 1.0
  cvar_alpha: 0.95
  cvar_budget_ratio: 0.18
  cvar_budget_min: 220000.0
  cvar_budget_eps: 1.0
constraints:
  lock_ratio_min: 0.1
  lock_ratio_max: 0.85
  delta_h_max: 0.12
  delta_lock_cap: 0.12
reward:
  strong_baseline: dynamic_lock_only
  alpha_cost: 1.15
  beta_tail_risk: 0.55
  lambda_action_smooth: 0.12
  lambda_hourly_smooth: 0.08
  lambda_hedge_error: 0.18
  robust_eps: 1.0e-06
env:
  include_prev_reward: true
  reward_temperature: 2.2
rules:
  price_spread_weight: 0.45
  load_dev_weight: 0.35
  renewable_dev_weight: 0.2
  spread_threshold: 8.0
  load_dev_threshold: 120.0
  renewable_dev_threshold: 100.0
  band_base_multiplier: 1.05
  band_floor_mwh: 30.0
  band_cap_ratio: 1.1
  ancillary_tight_multiplier: 0.88
  peak_shaving_pause_multiplier: 0.92
  price_spike_shrink: 0.12
  gamma_max: 420.0
  non_negative_clip: true
  signal_clip: 1.0
  smoothing_mode: soft_clip
training:
  algorithm: PPO
  policy: MlpPolicy
  total_timesteps: 50000
  eval_freq: 1000
  checkpoint_freq: 2000
  learning_rate: 0.00015
  n_steps: 256
  batch_size: 64
  n_epochs: 10
  gamma: 0.995
  gae_lambda: 0.97
  clip_range: 0.15
  ent_coef: 0.005
  vf_coef: 0.5
  max_grad_norm: 0.5
  seed: 42
  device: cpu
  use_vec_normalize: false
scenario:
  train_sequence_length: 96
  block_size: 3
  bootstrap_seed: 42
  training_sequence_method: block_bootstrap
benchmarks:
  fixed_lock_ratio: 0.6
  dynamic_lock_base: 0.55
  dynamic_lock_spread_penalty: 0.1
  dynamic_lock_renewable_bonus: 0.08
  dynamic_lock_policy_bonus: 0.05
  dynamic_lock_linked_price_penalty: 0.08
  rule_only_bandwidth: 0.7
