benchmarks:
  fixed_lock_ratio: 0.60
  dynamic_lock_base: 0.55
  dynamic_lock_spread_penalty: 0.10
  dynamic_lock_renewable_bonus: 0.08
  dynamic_lock_policy_bonus: 0.05
  dynamic_lock_linked_price_penalty: 0.08
  rule_only_bandwidth: 0.70

sensitivity:
  beta_tail_risk:
    - 0.04
    - 0.06
    - 0.10
  market_vol_scale:
    - 0.80
    - 1.00
    - 1.20
  price_cap_multiplier:
    - 0.90
    - 1.00
    - 1.10

robustness:
  contract_ratio_shift:
    - -0.10
    - 0.00
    - 0.10
  policy_cutoffs:
    - "2026-01-01"
    - "2026-02-01"
  forecast_error_scale:
    - 0.80
    - 1.00
    - 1.20

hparam_search:
  manual_grid:
    - learning_rate: 0.0003
      n_steps: 128
      batch_size: 32
      ent_coef: 0.01
      beta_tail_risk: 0.06
      lambda_hedge_error: 100.0
      forecast_error_scale: 1.00
    - learning_rate: 0.0001
      n_steps: 128
      batch_size: 32
      ent_coef: 0.02
      beta_tail_risk: 0.10
      lambda_hedge_error: 120.0
      forecast_error_scale: 0.85
  random_search:
    n_trials: 2
    learning_rate_range:
      - 0.0001
      - 0.0005
    ent_coef_range:
      - 0.005
      - 0.03
    beta_tail_risk_range:
      - 0.04
      - 0.10
    lambda_hedge_error_range:
      - 80.0
      - 140.0
    forecast_error_scale_range:
      - 0.80
      - 1.10
  total_timesteps: 1024
